version: '3'

# Run `task` (or `task dev`) to start both backend and frontend in parallel.
# Requires: https://taskfile.dev
# Deploy requires: https://kamal-deploy.org

dotenv: ['.env']

vars:
  BACKEND_DIR: backend
  FRONTEND_DIR: frontend

tasks:

  default:
    desc: "Start backend + frontend (dev)"
    deps: [backend, frontend]

  dev:
    desc: "Alias for default — start backend + frontend"
    deps: [backend, frontend]

  backend:
    desc: "Start Go backend (downloads Qwen 0.5B + llama-server on first run)"
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - go run .
    silent: false

  frontend:
    desc: "Start React frontend dev server (http://localhost:5173)"
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - npm run dev
    silent: false

  install:
    desc: "Install frontend npm dependencies"
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - npm install

  build:
    desc: "Build backend binary + frontend production bundle"
    deps: [build:backend, build:frontend]

  build:backend:
    desc: "Build Go backend binary → backend/bin/small-llm"
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - go build -o bin/small-llm .

  build:frontend:
    desc: "Build React frontend production bundle → frontend/dist/"
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - npm run build

  test:
    desc: "Run Go backend unit tests"
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - go test ./...

  test:frontend:
    desc: "Run frontend Vitest unit tests"
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - npm run test:run

  test:all:
    desc: "Run all tests (backend unit + frontend unit)"
    deps: [test, test:frontend]

  docker:test:
    desc: "Run all tests inside Docker containers (no local runtime required)"
    cmds:
      - docker compose -f docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from test-runner
      - docker compose -f docker-compose.test.yml down --volumes

  tidy:
    desc: "Tidy Go modules"
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - go mod tidy

  deploy:
    desc: "Deploy to production server via Kamal"
    cmds:
      - kamal deploy

  deploy:setup:
    desc: "First-time Kamal infrastructure setup (creates volumes, proxy, etc.)"
    cmds:
      - kamal setup

  deploy:logs:
    desc: "Tail production container logs"
    cmds:
      - kamal app logs

  clean:
    desc: "Remove build artefacts"
    cmds:
      - rm -rf {{.BACKEND_DIR}}/bin
      - rm -rf {{.FRONTEND_DIR}}/dist

